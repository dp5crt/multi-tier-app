apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app-production
data:
  NODE_ENV: "production"
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "appdb"
  PORT: "5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: app-production
type: Opaque
stringData:
  DB_USER: appuser
  DB_PASSWORD: apppassword
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app-production
  labels:
    app: backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      serviceAccountName: backend-sa
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: app-production
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  type: ClusterIP