apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-scaler
spec:
  replicas: 3 # Running 3 copies for high availability
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web-app
        image: web:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80