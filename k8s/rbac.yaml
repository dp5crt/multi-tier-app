apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: app-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: app-production
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: app-production
subjects:
- kind: ServiceAccount
  name: backend-sa
  namespace: app-production
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: app-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-role
  namespace: app-production
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-rolebinding
  namespace: app-production
subjects:
- kind: ServiceAccount
  name: web-sa
  namespace: app-production
roleRef:
  kind: Role
  name: web-role
  apiGroup: rbac.authorization.k8s.io